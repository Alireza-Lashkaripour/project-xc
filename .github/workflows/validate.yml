name: Validate Project XC data

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate data
        run: python3 scripts/validate_data.py
      - name: Validate Quantum Chemistry Academy
        run: python3 scripts/validate_academy.py
      - name: Test Academy HTML contract parser
        run: python3 scripts/test_academy_validator.py
      - name: Test Quantum Foundations numerical models
        run: node scripts/test_academy_models.js
      - name: Test Mathematical Language numerical models
        run: node scripts/test_qc_math_models.js
      - name: Test Atomic Structure numerical models
        run: node scripts/test_qc_atomic_models.js
      - name: Test Atomic Structure keyboard and degenerate-plot interactions
        run: node scripts/test_qc_atomic_interactions.js
      - name: Test Approximation Thinking numerical models
        run: node scripts/test_qc_approximation_models.js
      - name: Test Approximation Thinking interactions and mobile plots
        run: node scripts/test_qc_approximation_interactions.js
      - name: Test Many-Electron Wavefunctions finite models
        run: node scripts/test_qc_many_electron_models.js
      - name: Test Many-Electron Wavefunctions interactions and mobile plots
        run: node scripts/test_qc_many_electron_interactions.js
      - name: Test Hartree-Fock and SCF finite models
        run: node scripts/test_qc_hartree_fock_models.js
      - name: Test Hartree-Fock and SCF interactions and mobile plots
        run: node scripts/test_qc_hartree_fock_interactions.js
      - name: Test Academy progress compatibility
        run: node scripts/test_academy_core.js
      - name: Test Basis Quest badge migration
        run: node scripts/test_basis_progress.js
      - name: Validate harness queue
        run: python3 scripts/harness_status.py
      - name: Build site
        run: python3 scripts/build_site.py
      - name: Check built-site links and assets
        run: python3 scripts/check_site_links.py
