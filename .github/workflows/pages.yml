name: Deploy Project XC site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Gate deployment on Academy models and progress
        run: |
          python3 scripts/test_academy_validator.py
          node scripts/test_academy_models.js
          node scripts/test_qc_math_models.js
          node scripts/test_qc_atomic_models.js
          node scripts/test_qc_atomic_interactions.js
          node scripts/test_qc_approximation_models.js
          node scripts/test_qc_approximation_interactions.js
          node scripts/test_qc_many_electron_models.js
          node scripts/test_qc_many_electron_interactions.js
          node scripts/test_qc_hartree_fock_models.js
          node scripts/test_qc_hartree_fock_interactions.js
          node scripts/test_qc_geometry_models.js
          node scripts/test_qc_geometry_interactions.js
          node scripts/test_academy_core.js
          node scripts/test_basis_progress.js
      - name: Build static site
        run: python3 scripts/build_site.py
      - name: Check built site links and assets
        run: python3 scripts/check_site_links.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
