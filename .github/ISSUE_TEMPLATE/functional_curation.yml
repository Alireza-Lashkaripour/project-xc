name: Functional curation record
about: Propose or improve a curated XC functional record
title: "Curate functional: <name>"
labels: [curation, functional]
body:
  - type: input
    id: name
    attributes:
      label: Functional name
      placeholder: B3LYP, PBE0, SCAN, ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and references
      description: DOI links, program docs, source-code links, or reproducible logs.
    validations:
      required: true
  - type: textarea
    id: caveats
    attributes:
      label: Known aliases or ambiguity
      placeholder: VWN variant, omega value, dispersion correction location, etc.
